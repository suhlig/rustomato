name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: rustomato-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            asset: rustomato-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: rustomato-darwin-amd64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: rustomato-darwin-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Compress binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} rustomato

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

      - name: Compute SHA256
        id: sha256
        run: |
          echo "darwin_arm64=$(sha256sum artifacts/rustomato-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          body_path: release-notes.md

      - name: Bump Homebrew Formula
        uses: mislav/bump-homebrew-formula-action@v4.1
        with:
          formula-name: rustomato
          homebrew-tap: suhlig/homebrew-tap
          download-url: https://github.com/suhlig/rustomato/releases/download/${{ github.ref_name }}/rustomato-darwin-arm64.tar.gz
          download-sha256: ${{ steps.sha256.outputs.darwin_arm64 }}
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
